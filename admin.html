<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BillDEE Admin — Payment Requests</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f8;color:#1a1a2e;min-height:100vh}
.topbar{background:#0b6b73;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:18px;font-weight:800}
.badge{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
.badge.pending{background:#fef3c7;color:#92400e}
.badge.approved,.badge.auto_approved{background:#d1fae5;color:#065f46}
.badge.rejected{background:#fee2e2;color:#991b1b}
.container{max-width:960px;margin:0 auto;padding:20px}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filters button{padding:7px 16px;border-radius:99px;border:none;background:#fff;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.filters button.on{background:#0b6b73;color:#fff}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-top{display:flex;align-items:flex-start;gap:14px}
.slip-thumb{width:72px;height:96px;object-fit:cover;border-radius:10px;border:1px solid #e5e7eb;flex-shrink:0;cursor:pointer}
.slip-thumb:hover{opacity:.85}
.info{flex:1}
.biz-name{font-size:16px;font-weight:800;margin-bottom:4px}
.meta{font-size:12.5px;color:#6b7280;line-height:1.7}
.amount{font-size:22px;font-weight:800;color:#0b6b73;margin:6px 0}
.ai-row{background:#f0fdf4;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:10px;line-height:1.7}
.ai-row.fail{background:#fef2f2}
.actions{display:flex;gap:8px;margin-top:12px}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-approve{background:#0b6b73;color:#fff}
.btn-reject{background:#fee2e2;color:#991b1b}
.btn-approve:hover{background:#0a5c63}
.btn-reject:hover{background:#fecaca}
.btn:disabled{opacity:.5;cursor:not-allowed}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.open{display:flex}
.modal img{max-width:100%;max-height:90vh;border-radius:12px}
.modal-close{position:absolute;top:16px;right:16px;background:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:60px 20px;color:#9ca3af;font-size:15px}
.stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#fff;border-radius:14px;padding:14px 18px;flex:1;min-width:120px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-n{font-size:28px;font-weight:800;color:#0b6b73}
.stat-l{font-size:12px;color:#6b7280;margin-top:2px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:32px;max-width:340px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.12);text-align:center}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:6px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:20px}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px}
.inp:focus{outline:none;border-color:#0b6b73}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:8px">🔐</div>
    <h2>BillDEE Admin</h2>
    <p>เข้าสู่ระบบด้วยบัญชี Admin</p>
    <input class="inp" type="email" id="adm-email" placeholder="Email"/>
    <input class="inp" type="password" id="adm-pass" placeholder="Password"/>
    <button class="btn btn-approve" style="width:100%;padding:12px" onclick="adminLogin()">เข้าสู่ระบบ</button>
    <div id="login-err" style="color:#dc2626;font-size:13px;margin-top:10px"></div>
  </div>
</div>

<div id="main-screen" style="display:none">
  <div class="topbar">
    <div style="font-size:26px">💼</div>
    <h1>BillDEE Admin · Payment Requests</h1>
    <div style="flex:1"></div>
    <button onclick="logout()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">ออกจากระบบ</button>
  </div>
  <div class="container">
    <div class="stat-row" id="stats"></div>
    <div class="filters">
      <button class="on" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button onclick="setFilter('pending',this)">รอตรวจ</button>
      <button onclick="setFilter('auto_approved',this)">AI ผ่านอัตโนมัติ</button>
      <button onclick="setFilter('approved',this)">อนุมัติแล้ว</button>
      <button onclick="setFilter('rejected',this)">ปฏิเสธ</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<!-- Slip full-size modal -->
<div class="modal" id="slip-modal" onclick="closeSlipModal()">
  <button class="modal-close" onclick="closeSlipModal()">✕</button>
  <img id="slip-modal-img" src="" alt="slip"/>
</div>

<script>
const SB_URL='https://cfbknvjkknhfsxnrejlc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmYmtudmpra25oZnN4bnJlamxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDU1NzQsImV4cCI6MjA5NjU4MTU3NH0.BEwgucGKJzc_cdZElcozwoogz8oIbwz6lAu9wom1zHk';
const ADMIN_EMAIL='kanitthaphoothong@gmail.com';

const sb=supabase.createClient(SB_URL,SB_KEY);
let allData=[];
let curFilter='all';

async function adminLogin(){
  const email=document.getElementById('adm-email').value.trim();
  const pass=document.getElementById('adm-pass').value;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('login-err').textContent=error.message;return}
  if(data.user.email!==ADMIN_EMAIL){await sb.auth.signOut();document.getElementById('login-err').textContent='ไม่มีสิทธิ์เข้าถึง';return}
  showMain();
}

async function showMain(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  await loadData();
}

async function loadData(){
  const{data,error}=await sb.from('payment_requests').select('*').order('created_at',{ascending:false});
  if(error){document.getElementById('list').innerHTML=`<div class="empty">Error: ${error.message}</div>`;return}
  allData=data||[];
  renderStats();
  renderList();
}

function renderStats(){
  const pending=allData.filter(r=>r.status==='pending').length;
  const approved=allData.filter(r=>r.status==='approved'||r.status==='auto_approved').length;
  const total=allData.reduce((s,r)=>(r.status==='approved'||r.status==='auto_approved'?s+parseFloat(r.amount||0):s),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${pending}</div><div class="stat-l">รอตรวจสอบ</div></div>
    <div class="stat"><div class="stat-n">${approved}</div><div class="stat-l">อนุมัติแล้ว</div></div>
    <div class="stat"><div class="stat-n">฿${total.toLocaleString()}</div><div class="stat-l">รายรับรวม</div></div>
  `;
}

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.filters button').forEach(b=>b.className='btn');
  btn.className='btn on';
  renderList();
}

function renderList(){
  const rows=curFilter==='all'?allData:allData.filter(r=>r.status===curFilter);
  if(!rows.length){document.getElementById('list').innerHTML='<div class="empty">ไม่มีรายการ</div>';return}
  document.getElementById('list').innerHTML=rows.map(r=>cardHTML(r)).join('');
}

function cardHTML(r){
  const d=new Date(r.created_at);
  const dateStr=d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const planName={basic:'Basic ฿109',smart:'Smart ฿499',pro:'Pro ฿1,190'}[r.plan]||r.plan;
  const slip=r.slip_img?`<img class="slip-thumb" src="${r.slip_img}" alt="slip" onclick="openSlip('${r.id}')"/>`
    :`<div style="width:72px;height:96px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:11px;flex-shrink:0">ไม่มีสลิป</div>`;
  const aiRow=r.ai_verified
    ?`<div class="ai-row">✅ AI ยืนยัน — ยอด ฿${r.ai_amount||'?'} · วันที่ ${r.ai_date||'?'} · ref: ${r.ai_ref||'?'}</div>`
    :`<div class="ai-row fail">⚠️ AI: ${r.ai_reason||'ไม่สามารถยืนยันอัตโนมัติ'}</div>`;
  const actions=r.status==='pending'||r.status==='auto_approved'
    ?`<button class="btn btn-approve" onclick="approve('${r.id}','${r.business_id}','${r.plan}')">✓ อนุมัติ</button>
       <button class="btn btn-reject" onclick="reject('${r.id}')">✕ ปฏิเสธ</button>`
    :`<span style="font-size:13px;color:#6b7280">${r.status==='approved'?'✓ อนุมัติแล้ว':'✕ ปฏิเสธแล้ว'} · ${r.approved_at?new Date(r.approved_at).toLocaleDateString('th-TH'):''}</span>`;
  return`<div class="card" id="card-${r.id}">
    <div class="card-top">
      ${slip}
      <div class="info">
        <div class="biz-name">${esc(r.biz_name||'ไม่ระบุ')}</div>
        <div class="amount">฿${parseFloat(r.amount).toLocaleString()}</div>
        <div class="meta">แพ็กเกจ: <b>${planName}</b> · ref: <b>${r.ref_code||'-'}</b><br/>${dateStr}</div>
        <span class="badge ${r.status}">${{pending:'รอตรวจ',approved:'อนุมัติแล้ว',auto_approved:'AI ผ่านอัตโนมัติ',rejected:'ปฏิเสธ'}[r.status]||r.status}</span>
      </div>
    </div>
    ${aiRow}
    <div class="actions">${actions}</div>
  </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function approve(id,bizId,plan){
  const btn=event.target;btn.disabled=true;btn.textContent='กำลังอนุมัติ…';
  const expire=new Date(Date.now()+31*24*60*60*1000).toISOString();
  const[r1,r2]=await Promise.all([
    sb.from('payment_requests').update({status:'approved',approved_at:new Date().toISOString()}).eq('id',id),
    sb.from('businesses').update({plan,plan_started_at:new Date().toISOString(),plan_expire_at:expire}).eq('id',bizId),
  ]);
  if(r1.error||r2.error){alert('Error: '+(r1.error||r2.error).message);btn.disabled=false;btn.textContent='✓ อนุมัติ';return}
  // Push LINE message to user
  await fetch('/api/notify-user',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({business_id:bizId,plan})
  }).catch(e=>console.warn('notify-user',e));
  await loadData();
}

async function reject(id){
  if(!confirm('ปฏิเสธรายการนี้?'))return;
  await sb.from('payment_requests').update({status:'rejected',approved_at:new Date().toISOString()}).eq('id',id);
  await loadData();
}

function openSlip(id){
  const r=allData.find(x=>x.id===id);
  if(!r?.slip_img)return;
  document.getElementById('slip-modal-img').src=r.slip_img;
  document.getElementById('slip-modal').classList.add('open');
}
function closeSlipModal(){document.getElementById('slip-modal').classList.remove('open')}

async function logout(){await sb.auth.signOut();location.reload()}

// Auto-login if session exists
sb.auth.getSession().then(({data})=>{
  if(data?.session?.user?.email===ADMIN_EMAIL)showMain();
});
</script>
</body>
</html>
